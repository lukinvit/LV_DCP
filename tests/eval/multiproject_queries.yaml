        text: "keyword research service wordstat volume tracking"
        mode: navigate
        expected:
          files:
            - src/services/keyword_research_service.py
            - src/temporal/workflows/keyword_research.py
      - id: tc04-web-app
        text: "FastAPI web app create_app router middleware"
        mode: navigate
        expected:
          files:
            - src/web/app.py
      - id: tc05-temporal-workflows
        text: "temporal workflow schedule pipeline maintenance"
        mode: navigate
        expected:
          files:
            - src/temporal/workflows/pipeline.py
            - src/temporal/workflows/keyword_research.py

