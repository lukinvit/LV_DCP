# Gold queries for edit-task retrieval (see specs/006, T023).
# Each entry describes an edit the user would ask for; expected files are
# the ones the agent must touch (or at least read) to do the task correctly.

queries:
  - id: e01-add-ragas-metric
    text: add a new RAGAS metric alongside context_precision / context_recall / faithfulness
    mode: edit
    expected:
      files: [libs/eval/ragas_adapter.py]
      symbols: [libs.eval.ragas_adapter.RagasAdapter]
    tags: [edit, ragas]

  - id: e02-extend-cost-guard-budget
    text: allow CostGuard to accept per-model overrides, not just a single max_usd
    mode: edit
    expected:
      files: [libs/eval/cost_guard.py, tests/eval/test_cost_guard.py]
      symbols: [libs.eval.cost_guard.CostGuard]
    tags: [edit, cost]

  - id: e03-add-gold-query-field
    text: add an optional `difficulty` field to GoldQuery
    mode: edit
    expected:
