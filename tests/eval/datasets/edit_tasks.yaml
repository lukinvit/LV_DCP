        - libs/eval/dataset_schema.py
        - tests/eval/test_dataset_schema.py
      symbols: [libs.eval.dataset_schema.GoldQuery]
    tags: [edit, schema]

  - id: e04-report-show-cache-ratio
    text: show cache hit ratio in the LLM-judge section of the markdown report
    mode: edit
    expected:
      files:
