# Gold queries testing graph expansion (see specs/006, T022).
# Mode 'graph': seed symbol → expected top-K callers/callees/references.
# These are the queries that punish systems which return only direct hits
# and miss the dependency neighborhood an engineer actually needs to read.

queries:
  - id: g01-ragas-adapter-callers
    text: RagasAdapter callers and usage sites
    mode: graph
    expected:
      files:
        - libs/eval/runner.py
        - tests/eval/test_ragas_adapter.py
        - tests/eval/test_eval_full.py
      symbols:
        - libs.eval.runner.enrich_with_ragas
    tags: [graph, callers]

  - id: g02-cost-guard-usage-sites
