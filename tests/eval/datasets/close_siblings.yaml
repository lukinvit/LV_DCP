# Gold queries with close-sibling symbols (see specs/006, T021).
# Each pair targets a narrow disambiguation: sync vs async, pre vs post refactor,
# nearly-synonymous operations. Retrieval quality here correlates with users'
# experience of "did the system find the *right* one" vs "a nearby cousin".

queries:
  - id: s01-run-eval-sync-vs-async-enrich
    text: synchronous run_eval without llm judge
    mode: navigate
    expected:
      files: [libs/eval/runner.py]
      symbols: [libs.eval.runner.run_eval]
    notes: "Must NOT surface enrich_with_ragas (async)."
    tags: [sibling, sync-vs-async]

  - id: s02-async-enrich-with-ragas
    text: async enrich with llm judge scores
    mode: navigate
    expected:
      files: [libs/eval/runner.py]
      symbols: [libs.eval.runner.enrich_with_ragas]
    notes: "Must NOT surface run_eval (sync)."
    tags: [sibling, sync-vs-async]

  - id: s03-generate-per-query-report
    text: generate per-query markdown report
    mode: navigate
    expected:
      files: [libs/eval/report.py]
      symbols: [libs.eval.report.generate_per_query_report]
    notes: "Close sibling of generate_comparison_report."
    tags: [sibling, report]

  - id: s04-generate-comparison-report
